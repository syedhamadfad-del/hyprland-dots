# Hyprland Configuration

## Monitors
monitor=DP-1,1920x1080@60Hz,Gamma 1.0
monitor=HDMI-1,1920x1080@60Hz,Gamma 1.0

## Programs
exec=swaybg -o DP-1 --moving --scale fit /path/to/wallpaper.jpg
exec=some_program

## Autostart
autostart=some_service

## Environment Variables
set BACKEND=wl

## General Settings
set theme="dark"

## Decoration
border_color=rgba(0,0,0,1)
active_border_color=rgba(255,255,255,1)

## Animations
set animations=true
set animation_duration=200ms

## Dwindle
set dwindle_position=center

## Input
input="mod+Shift+Right"

## Bindings
bindsym=$mod+Return exec alacritty
bindsym=$mod+q kill
bindsym=$mod+d exec rofi -show drun

## Window Rules
floating=on

## Additional Settings
set additional_setting=true